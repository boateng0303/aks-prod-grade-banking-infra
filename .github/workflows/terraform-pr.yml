name: 'Terraform Pull Request Validation'

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Infrastructure/azure/**'
      - '.github/workflows/terraform-*.yml'
      - '.github/actions/terraform-azure/**'

concurrency:
  group: terraform-pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TF_LOG: INFO
  TF_INPUT: false

permissions:
  id-token: write      # Required for OIDC
  contents: read       # Required for checkout
  pull-requests: write # Required for PR comments
  security-events: write # Required for SARIF upload

jobs:
  # ============================================
  # TERRAFORM PLAN FOR ALL ENVIRONMENTS
  # ============================================
  plan:
    name: Plan - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-azure
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ matrix.environment }}
          operation: plan
          backend-resource-group: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
          backend-storage-account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
          backend-container: tfstate
          enable-security-scan: 'true'
          enable-cost-estimation: 'true'
          infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}
          github-token: ${{ secrets.MY_TOKEN }}
          plan-title: '🏗️ Terraform Plan'

  # ============================================
  # COMBINED INFRACOST REPORT
  # ============================================
  infracost-report:
    name: Combined Cost Report
    runs-on: ubuntu-latest
    needs: plan
    if: always() && !cancelled()
    steps:
      - name: Download all Infracost artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: infracost-*
          path: /tmp/infracost
          merge-multiple: false

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Combine Infracost Reports
        run: |
          # Find all infracost JSON files
          find /tmp/infracost -name "*.json" -type f
          
          # Combine all reports into one
          infracost output \
            --path "/tmp/infracost/*/*.json" \
            --format json \
            --out-file /tmp/infracost-combined.json
          
          echo "Combined report generated:"
          cat /tmp/infracost-combined.json | jq '.totalMonthlyCost'

      - name: Post Combined Infracost Comment
        uses: infracost/actions/comment@v1
        with:
          path: /tmp/infracost-combined.json
          behavior: update

  # ============================================
  # SECURITY GATE
  # ============================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [plan, infracost-report]
    if: always() && !cancelled()
    steps:
      - name: Security Check Passed
        run: |
          echo "✅ All security checks passed"
          echo "PR is ready for review"
