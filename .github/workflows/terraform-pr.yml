name: Terraform PR Validation

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Infrastructure/azure/**'
      - '.github/workflows/terraform-*.yml'
      - '.github/actions/terraform-azure/**'

concurrency:
  group: terraform-pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TF_LOG: INFO
  TF_INPUT: false

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  plan:
    name: Plan - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-azure
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ matrix.environment }}
          operation: plan
          backend-resource-group: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
          backend-storage-account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
          backend-container: tfstate
          enable-security-scan: 'true'
          enable-cost-estimation: 'true'
          infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}
          github-token: ${{ secrets.MY_TOKEN }}
          plan-title: '🏗️ Terraform Plan'

      infracost-comment:
      name: Infracost PR Comment
      runs-on: ubuntu-latest
      needs: plan
      if: github.event_name == 'pull_request'
      permissions:
        contents: read
        pull-requests: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Infracost
          uses: infracost/actions/setup@v3
          with:
            api-key: ${{ secrets.INFRACOST_API_KEY }}

        - name: Download artifacts
          uses: actions/download-artifact@v4
          with:
            path: artifacts

        - name: Show downloaded files
          shell: bash
          run: |
            find artifacts -type f | sort

        - name: Combine Infracost JSON files
          shell: bash
          run: |
            shopt -s globstar nullglob
            files=(artifacts/**/infracost-*.json)

            if [ ${#files[@]} -eq 0 ]; then
              echo "No Infracost JSON files found"
              exit 1
            fi

            infracost output \
              --path "${files[0]}" \
              $(for f in "${files[@]:1}"; do printf -- '--path %q ' "$f"; done) \
              --format json \
              --out-file combined-infracost.json

            cat combined-infracost.json | jq '.'

        - name: Post combined Infracost comment
          uses: infracost/actions/comment@v1
          with:
            path: combined-infracost.json
            behavior: update
          env:
            GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - plan
      - infracost-comment
    steps:
      - name: Security Check Passed
        run: |
          echo "✅ All security checks passed"
          echo "PR is ready for review"









