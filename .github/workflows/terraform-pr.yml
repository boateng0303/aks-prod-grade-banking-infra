name: 'Terraform Pull Request Validation'

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Infrastructure/azure/**'
      - '.github/workflows/terraform-*.yml'
      - '.github/actions/terraform-azure/**'

concurrency:
  group: terraform-pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TF_LOG: INFO
  TF_INPUT: false

permissions:
  id-token: write      # Required for OIDC
  contents: read       # Required for checkout
  pull-requests: write # Required for PR comments
  security-events: write # Required for SARIF upload

jobs:
  # ============================================
  # TERRAFORM PLAN FOR ALL ENVIRONMENTS
  # ============================================
  plan:
    name: Plan - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-azure
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ matrix.environment }}
          operation: plan
          backend-resource-group: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
          backend-storage-account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
          backend-container: tfstate
          enable-security-scan: 'true'
          enable-cost-estimation: 'true'
          infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}
          github-token: ${{ secrets.MY_TOKEN }}
          plan-title: '🏗️ Terraform Plan'

  # ============================================
  # SECURITY GATE
  # ============================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Security Check Passed
        run: |
          echo "✅ All security checks passed"
          echo "PR is ready for review"
